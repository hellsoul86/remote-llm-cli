name: Feature
about: Track a product or engineering feature
labels: [feature]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: One-line objective
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain are we solving?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: In / out scope
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Bullet list of testable outcomes
    validations:
      required: true
