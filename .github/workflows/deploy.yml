name: Deploy

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy environment
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: Git ref to deploy (optional)
        required: false
        type: string

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build binaries
        working-directory: server
        run: |
          mkdir -p ../dist/release/bin
          go build -trimpath -o ../dist/release/bin/remote-llm-server ./cmd/remote-llm-server
          go build -trimpath -o ../dist/release/bin/remote-llm-admin ./cmd/remote-llm-admin

      - name: Package release
        run: |
          mkdir -p dist/release/examples
          cp scripts/run-remote-llm-server.sh dist/release/bin/run-remote-llm-server.sh
          chmod +x dist/release/bin/run-remote-llm-server.sh
          cp examples/runtimes.example.json dist/release/examples/runtimes.example.json
          tar -C dist/release -czf dist/remote-llm-release.tgz .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-llm-release
          path: dist/remote-llm-release.tgz
          if-no-files-found: error

  validate-deploy-config:
    name: Validate Deploy Config
    runs-on: ubuntu-latest
    needs:
      - build-release
    outputs:
      deploy_targets: ${{ steps.validate.outputs.deploy_targets }}
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
    steps:
      - name: Validate targets and secrets
        id: validate
        env:
          DEPLOY_TARGETS: ${{ vars.DEPLOY_TARGETS }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${DEPLOY_TARGETS}" ]; then
            echo "::error::missing environment variable DEPLOY_TARGETS"
            exit 1
          fi
          echo "${DEPLOY_TARGETS}" | jq -e '. | type=="array" and length>0' >/dev/null
          echo "${DEPLOY_TARGETS}" | jq -e '.[] | has("name") and has("host") and has("user")' >/dev/null
          if [ -z "${DEPLOY_SSH_PRIVATE_KEY}" ]; then
            echo "::error::missing environment secret DEPLOY_SSH_PRIVATE_KEY"
            exit 1
          fi
          {
            echo "deploy_targets<<EOF"
            echo "${DEPLOY_TARGETS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  deploy:
    name: Deploy (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    needs:
      - build-release
      - validate-deploy-config
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.validate-deploy-config.outputs.deploy_targets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: remote-llm-release
          path: dist

      - name: Prepare SSH material
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          key_path="${RUNNER_TEMP}/deploy_key"
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "DEPLOY_SSH_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"

          if [ -n "${DEPLOY_SSH_KNOWN_HOSTS}" ]; then
            known_hosts_path="${RUNNER_TEMP}/known_hosts"
            printf '%s\n' "${DEPLOY_SSH_KNOWN_HOSTS}" > "${known_hosts_path}"
            chmod 600 "${known_hosts_path}"
            echo "DEPLOY_SSH_KNOWN_HOSTS_PATH=${known_hosts_path}" >> "${GITHUB_ENV}"
          fi

      - name: Deploy via SSH
        env:
          DEPLOY_RELEASE_TARBALL: ${{ github.workspace }}/dist/remote-llm-release.tgz
          DEPLOY_RELEASE_ID: ${{ github.sha }}
          DEPLOY_SSH_KEY_PATH: ${{ env.DEPLOY_SSH_KEY_PATH }}
          DEPLOY_SSH_KNOWN_HOSTS_PATH: ${{ env.DEPLOY_SSH_KNOWN_HOSTS_PATH }}
          DEPLOY_HOST: ${{ matrix.target.host }}
          DEPLOY_PORT: ${{ matrix.target.port || 22 }}
          DEPLOY_USER: ${{ matrix.target.user }}
          DEPLOY_PATH: ${{ matrix.target.deploy_path || '/opt/remote-llm-cli' }}
          DEPLOY_SERVICE_NAME: ${{ matrix.target.service_name || 'remote-llm-server' }}
          DEPLOY_ADDR: ${{ matrix.target.addr || ':8080' }}
          DEPLOY_DATA_PATH: ${{ matrix.target.data_path }}
          DEPLOY_RUNTIME_CONFIG_PATH: ${{ matrix.target.runtime_config_path }}
          DEPLOY_KEEP_RELEASES: ${{ matrix.target.keep_releases || 5 }}
          DEPLOY_HEALTHCHECK_URL: ${{ matrix.target.healthcheck_url || 'http://127.0.0.1:8080/v1/healthz' }}
        run: |
          chmod +x scripts/deploy_release_via_ssh.sh
          scripts/deploy_release_via_ssh.sh
